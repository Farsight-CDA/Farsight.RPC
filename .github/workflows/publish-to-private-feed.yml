name: Publish Farsight.Rpc.Sdk

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore Farsight.Rpc.slnx

      - name: Calculate next package version
        id: version
        shell: bash
        run: |
          project_path="Farsight.Rpc.Sdk/Farsight.Rpc.Sdk.csproj"
          version="$(dotnet msbuild "$project_path" -nologo -getProperty:Version)"

          if [[ -z "$version" ]]; then
            echo "Could not resolve Version for $project_path"
            exit 1
          fi

          if [[ ! "$version" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-.*)?$ ]]; then
            echo "Unexpected Version format '$version' in $project_path"
            exit 1
          fi

          base_version="${BASH_REMATCH[1]}"
          build_number="${{ github.run_number }}"
          run_attempt="${{ github.run_attempt }}"
          package_version="$base_version-private.$build_number.$run_attempt"

          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Build solution
        run: dotnet build Farsight.Rpc.slnx --configuration Release --no-restore -warnaserror

      - name: Pack SDK package
        run: dotnet pack Farsight.Rpc.Sdk/Farsight.Rpc.Sdk.csproj --configuration Release --no-build --output ./nupkgs -p:Version=${{ steps.version.outputs.version }}

      - name: Publish to farsight-packages
        env:
          API_KEY: ${{ secrets.NUGET_PRIVATE_API_KEY }}
        shell: bash
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://nuget.farsight-cda.de/nuget/farsight-packages/v3/index.json --api-key "$API_KEY" --skip-duplicate
